const STORAGE_KEY = 'ngfw_quiz_state_v2';
const SHUFFLE_KEY = 'ngfw_quiz_shuffle_v2';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
// shuffleMap[origQn] = { qOrder: index, optMap: { displayLetter: origLetter } }
let shuffleMap = JSON.parse(localStorage.getItem(SHUFFLE_KEY) || 'null');
let displayOrder = []; // array of question objects in display order

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function saveShuffle() { localStorage.setItem(SHUFFLE_KEY, JSON.stringify(shuffleMap)); }

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildShuffle() {
  shuffleMap = {};
  const qOrder = shuffleArray(QUESTIONS.map(q => q.n));
  qOrder.forEach((qn, idx) => {
    const q = QUESTIONS.find(x => x.n === qn);
    const origKeys = ['A','B','C','D'].filter(k => q.opts[k]);
    const shuffled = shuffleArray(origKeys);
    const optMap = {};
    const labels = ['A','B','C','D'];
    shuffled.forEach((origK, i) => { optMap[labels[i]] = origK; });
    shuffleMap[qn] = { idx, optMap };
  });
  saveShuffle();
}

function renderQuiz() {
  if (!shuffleMap) buildShuffle();
  // Build display order
  displayOrder = QUESTIONS.slice().sort((a,b) => shuffleMap[a.n].idx - shuffleMap[b.n].idx);

  const container = document.getElementById('quiz');
  container.innerHTML = '';
  displayOrder.forEach((q, displayIdx) => {
    const div = document.createElement('div');
    div.className = 'q';
    div.id = 'q' + q.n;
    const inputType = q.multi ? 'checkbox' : 'radio';
    const multiHint = q.multi ? `<span class="multi-hint">複選 ${q.ans.length} 項</span>` : '';
    const optMap = shuffleMap[q.n].optMap;
    let optsHtml = '';
    for (const displayK of ['A','B','C','D']) {
      const origK = optMap[displayK];
      if (!origK || !q.opts[origK]) continue;
      optsHtml += `<label class="opt" data-q="${q.n}" data-k="${origK}" data-dk="${displayK}">
        <input type="${inputType}" name="q${q.n}" value="${origK}" onchange="onSelect(${q.n})">
        <b>${displayK}.</b> ${escapeHtml(q.opts[origK])}
      </label>`;
    }
    div.innerHTML = `
      <div class="num">第 ${displayIdx + 1} 題　<span style="color:#888;font-weight:400">(原題庫 Q${q.n})</span> ${multiHint}</div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      ${optsHtml}
      <div class="feedback" id="fb${q.n}" style="display:none"></div>
    `;
    container.appendChild(div);
  });
  restoreState();
  renderList();
  updateStats();
}

function reshuffle() {
  if (!confirm('重新洗牌會清除目前的作答紀錄，確定嗎？')) return;
  state = {};
  saveState();
  buildShuffle();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Convert original letter to display letter
function origToDisplay(qn, origK) {
  const map = shuffleMap[qn].optMap;
  for (const dK in map) if (map[dK] === origK) return dK;
  return origK;
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function onSelect(n) {
  const sel = getSelected(n);
  document.querySelectorAll(`.opt[data-q="${n}"]`).forEach(el => {
    el.classList.toggle('selected', sel.includes(el.dataset.k));
  });
  // Save selection only (don't reveal correctness yet)
  state[n] = { sel, submitted: false };
  saveState();
  updateStats();
  renderList();
}

function getSelected(n) {
  return Array.from(document.querySelectorAll(`input[name="q${n}"]:checked`)).map(i => i.value);
}

function submitAll() {
  const unanswered = QUESTIONS.filter(q => !state[q.n] || state[q.n].sel.length === 0);
  if (unanswered.length > 0) {
    if (!confirm(`還有 ${unanswered.length} 題未作答，仍要送出評分？\n（未作答將視為答錯）`)) return;
  }
  QUESTIONS.forEach(q => {
    const s = state[q.n] || { sel: [] };
    const correct = arrayEqual([...s.sel].sort(), [...q.ans].sort());
    state[q.n] = { sel: s.sel, submitted: true, correct };
    showResult(q.n);
  });
  saveState();
  updateStats();
  renderList();
  // Scroll to top to show score
  window.scrollTo({top:0, behavior:'smooth'});
  // Show final score banner
  const ok = Object.values(state).filter(s => s.correct).length;
  setTimeout(() => alert(`🎉 評分完成！\n\n答對 ${ok} / ${QUESTIONS.length} 題\n正確率：${Math.round(ok/QUESTIONS.length*100)}%`), 400);
}

function arrayEqual(a, b) {
  return a.length === b.length && a.every((v,i) => v === b[i]);
}

function showResult(n) {
  const q = QUESTIONS.find(x => x.n === n);
  const s = state[n];
  if (!s || !s.submitted) return;
  document.querySelectorAll(`.opt[data-q="${n}"]`).forEach(el => {
    el.classList.remove('selected','correct','wrong','reveal-correct');
    const isUserPicked = s.sel.includes(el.dataset.k);
    const isCorrectAns = q.ans.includes(el.dataset.k);
    if (isUserPicked && isCorrectAns) el.classList.add('correct');
    else if (isUserPicked && !isCorrectAns) el.classList.add('wrong');
    else if (!isUserPicked && isCorrectAns) el.classList.add('reveal-correct');
    el.querySelector('input').disabled = true;
  });
  const fb = document.getElementById('fb'+n);
  fb.style.display = 'block';
  // Convert original letters → display letters for current shuffle
  const displayAns = q.ans.map(k => origToDisplay(n, k)).sort();
  const displaySel = s.sel.map(k => origToDisplay(n, k)).sort();
  if (s.correct) {
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ 答對了！正確答案：<b>${displayAns.join(', ')}</b>`;
  } else {
    fb.className = 'feedback ng';
    fb.innerHTML = `❌ 答錯。您選：<b>${displaySel.join(', ') || '(未作答)'}</b>　正確答案：<b>${displayAns.join(', ')}</b>`;
  }
}

function restoreState() {
  for (const n in state) {
    const s = state[n];
    (s.sel || []).forEach(k => {
      const inp = document.querySelector(`input[name="q${n}"][value="${k}"]`);
      if (inp) inp.checked = true;
    });
    // restore visual selected state
    document.querySelectorAll(`.opt[data-q="${n}"]`).forEach(el => {
      el.classList.toggle('selected', (s.sel || []).includes(el.dataset.k));
    });
    if (s.submitted) showResult(parseInt(n));
  }
}

function updateStats() {
  const answered = Object.values(state).filter(s => s.sel && s.sel.length > 0).length;
  document.getElementById('answered').textContent = answered;

  const hasScored = Object.values(state).some(s => s.submitted);
  ['scoreBlock','scoreBlock2','scoreBlock3'].forEach(id =>
    document.getElementById(id).style.display = hasScored ? '' : 'none'
  );
  if (hasScored) {
    const ok = Object.values(state).filter(s => s.correct).length;
    const ng = QUESTIONS.length - ok;
    document.getElementById('okCnt').textContent = ok;
    document.getElementById('ngCnt').textContent = ng;
    document.getElementById('rate').textContent = Math.round(ok/QUESTIONS.length*100)+'%';
  }
}

function renderList() {
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  displayOrder.forEach((q, idx) => {
    const s = document.createElement('span');
    s.textContent = idx + 1;
    s.title = `原題庫 Q${q.n}`;
    const st = state[q.n];
    if (st && st.submitted) {
      s.className = st.correct ? 'done-ok' : 'done-ng';
    } else if (st && st.sel && st.sel.length > 0) {
      s.style.background = '#ffe9d6';
    }
    s.onclick = () => document.getElementById('q'+q.n).scrollIntoView({behavior:'smooth',block:'start'});
    list.appendChild(s);
  });
}

function toggleList() {
  const list = document.getElementById('questionList');
  list.style.display = list.style.display === 'none' ? 'grid' : 'none';
}

function resetAll() {
  if (!confirm('確定要清除全部作答紀錄並重新洗牌？')) return;
  state = {};
  saveState();
  localStorage.removeItem(SHUFFLE_KEY);
  shuffleMap = null;
  location.reload();
}

renderQuiz();
</script>
</body>
</html>
