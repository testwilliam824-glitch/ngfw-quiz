<script>
const QUESTIONS = [
{n:1,multi:true,ans:["B","D"],stem:"To maintain security efficacy of its public cloud resources by using native tools, a company purchases Cloud NGFW credits to replicate the Panorama, PA-Series, and VM-Series devices used in physical data centers. Resources exist on AWS and Azure:\n- The AWS deployment is architected with AWS Transit Gateway, to which all resources connect\n- The Azure deployment is architected with each application independently routing traffic\n\nThe engineer deploying Cloud NGFW in these two cloud environments must account for:\n- Minimize changes to the two cloud environments\n- Scale to the demands of the applications while using the least amount of compute resources\n- Allow the company to unify the Security policies across all protected areas\n\nWhich two implementations will meet these requirements? (Choose two.)",opts:{"A":"Deploy a VM-Series firewall in AWS in each VPC, create an IPSec tunnel between AWS and Azure, and manage the policy with Panorama.","B":"Deploy Cloud NGFW for Azure in vNET/s, update the vNET/s routing to path traffic through the deployed NGFWs, and manage the policy with Panorama.","C":"Deploy Cloud NGFW for Azure in vWAN, create a vWAN to route all appropriate traffic to the Cloud NGFW attached to the vWAN, and manage the policy with local rules.","D":"Deploy Cloud NGFW for AWS in a centralized Security VPC, update the Transit Gateway to route all appropriate traffic through the Security VPC, and manage the policy with Panorama."}},
{n:2,ans:["A"],stem:"During an upgrade to the routing infrastructure in a customer environment, the network administrator wants to implement Advanced Routing Engine (ARE) on a Palo Alto Networks firewall. Which firewall models support this configuration?",opts:{"A":"PA-5280, PA-7080, PA-3250, VM-Series","B":"PA-455, VM-Series, PA-1410, PA-5450","C":"PA-3260, PA-5410, PA-850, PA-460","D":"PA-7050, PA-1420, VM-Series, CN-Series"}},
{n:3,multi:true,ans:["A","B"],stem:"Which two statements apply to configuring required security rules when setting up an IPSec tunnel between a Palo Alto Networks firewall and a third-party gateway? (Choose two.)",opts:{"A":"For incoming and outgoing traffic through the tunnel, creating separate rules for each direction is optional.","B":"The IKE negotiation and IPSec/ESP packets are allowed by default via the intrazone default allow policy.","C":"For incoming and outgoing traffic through the tunnel, separate rules must be created for each direction.","D":"The IKE negotiation and IPSec/ESP packets are denied by default via the interzone default deny policy."}},
{n:4,ans:["C"],stem:"Which statement describes the role of Terraform in deploying Palo Alto Networks NGFWs?",opts:{"A":"It acts as a logging service for NGFW performance metrics.","B":"It orchestrates real-time traffic inspection for network segments.","C":"It provides Infrastructure-as-Code (IaC) to automate NGFW deployment.","D":"It manages threat intelligence data synchronization with NGFWs."}},
{n:5,ans:["D"],stem:"By default, which type of traffic is configured by service route configuration to use the management interface?",opts:{"A":"Security zone","B":"IPSec tunnel","C":"Virtual system (VSYS)","D":"Autonomous Digital Experience Manager (ADEM)"}},
{n:6,ans:["D"],stem:"In regard to the Advanced Routing Engine (ARE), what must be enabled first when configuring a logical router on a PAN-OS firewall?",opts:{"A":"License","B":"Plugin","C":"Content update","D":"General setting"}},
{n:7,multi:true,ans:["A","D"],stem:"Which two zone types are valid when configuring a new security zone? (Choose two.)",opts:{"A":"Tunnel","B":"Intrazone","C":"Internal","D":"Virtual Wire"}},
{n:8,ans:["A"],stem:"An organization has configured GlobalProtect in a hybrid authentication model using both certificate-based authentication for the pre-logon stage and SAML-based multi-factor authentication (MFA) for user logon. How does the GlobalProtect agent process the authentication flow on Windows endpoints?",opts:{"A":"The GlobalProtect agent uses the machine certificate to establish a pre-logon tunnel; upon user sign-in, it prompts for SAML-based MFA credentials, ensuring both device and user identities are validated before granting full access.","B":"The GlobalProtect agent uses the machine certificate during pre-logon for initial tunnel establishment, and then seamlessly reuses the same machine certificate for user-based authentication without requiring MFA.","C":"Once the machine certificate is validated at pre-logon, the Windows endpoint completes MFA on behalf of the user by passing existing Windows Credential Provider details to the GlobalProtect gateway without prompting the user.","D":"GlobalProtect requires the user to log in first for SAML-based MFA before establishing the pre-logon tunnel, rendering the pre-logon certificate authentication (CA) flow redundant."}},
{n:9,ans:["C"],stem:"An NGFW engineer is configuring multiple Panorama-managed firewalls to start sending all logs to Strata Logging Service. The Strata Logging Service instance has been provisioned, the required device certificates have been installed, and Panorama and the firewalls have been successfully onboarded to Strata Logging Service. Which configuration task must be performed to start sending the logs to Strata Logging Service and continue forwarding them to the Panorama log collectors as well?",opts:{"A":"Modify all active Log Forwarding profiles to select the \"Cloud Logging\" option in each profile match list in the appropriate device groups.","B":"Enable the \"Panorama/Cloud Logging\" option in the Logging and Reporting Settings section under Device → Setup → Management in the appropriate templates.","C":"Select the \"Enable Duplicate Logging\" option in the Cloud Logging section under Device → Setup → Management in the appropriate templates.","D":"Select the \"Enable Cloud Logging\" option in the Cloud Logging section under Device → Setup → Management in the appropriate templates."}},
{n:10,ans:["C"],stem:"An NGFW engineer is configuring multiple Layer 2 interfaces on a Palo Alto Networks firewall, and all interfaces must be assigned to the same VLAN. During initial testing, it is reported that clients located behind the various interfaces cannot communicate with each other. Which action taken by the engineer will resolve this issue?",opts:{"A":"Configure each interface to belong to the same Layer 2 zone and enable IP routing between them.","B":"Assign each interface to the appropriate Layer 2 zone and configure a policy that allows traffic within the VLAN.","C":"Assign each interface to the appropriate Layer 2 zone and configure Security policies for interfaces not assigned to the same zone.","D":"Enable IP routing between the interfaces and configure a Security policy to allow traffic between interfaces within the VLAN."}},
{n:11,ans:["B"],stem:"In a Palo Alto Networks environment, GlobalProtect has been enabled using certificate-based authentication for both users and devices. To ensure proper validation of certificates, one or more certificate profiles are configured. What function do certificate profiles serve in this context?",opts:{"A":"They store private keys for users and devices, effectively allowing the firewall to issue or reissue certificates if the primary Certificate Authority (CA) becomes unavailable, providing a built-in fallback CA to maintain continuous certificate issuance and authentication.","B":"They define trust anchors (root / intermediate Certificate Authorities (CAs)), specify revocation checks (CRL/OCSP), and map certificate attributes (e.g., CN) for user or device authentication.","C":"They allow the firewall to bypass certificate validation entirely, focusing only on username/password-based authentication.","D":"They provide a one-click mechanism to distribute certificates to all endpoints without relying on external enrollment methods."}},
{n:12,ans:["D"],stem:"How does a Palo Alto Networks NGFW respond when the preemptive hold time is set to 0 minutes during configuration of route monitoring?",opts:{"A":"It does not accept the configuration.","B":"It accepts the configuration but throws a warning message.","C":"It removes the static route because 0 is a NULL value.","D":"It reinstalls the route into the routing information base (RIB) as soon as the path comes up."}},
{n:13,ans:["B"],stem:"After an engineer configures an IPSec tunnel with a Cisco ASA, the Palo Alto Networks firewall generates system messages reporting the tunnel is failing to establish. Which of the following actions will resolve this issue?",opts:{"A":"Ensure that an active static or dynamic route exists for the VPN peer with next hop as the tunnel interface.","B":"Configure the Proxy IDs to match the Cisco ASA configuration.","C":"Check that IPSec is enabled in the management profile on the external interface.","D":"Validate the tunnel interface VLAN against the peer's configuration."}},
{n:14,ans:["C"],stem:"Which configuration in the LACP tab will enable pre-negotiation for an Aggregate Ethernet (AE) interface on a Palo Alto Networks high availability (HA) active/passive pair?",opts:{"A":"Set Transmission Rate to \"fast.\"","B":"Set passive link state to \"Auto.\"","C":"Set \"Enable in HA Passive State.\"","D":"Set LACP mode to \"Active.\""}},
{n:15,ans:["D"],stem:"When integrating Kubernetes with Palo Alto Networks NGFWs, what is used to secure traffic between microservices?",opts:{"A":"Service graph","B":"Ansible automation modules","C":"Panorama role-based access control (RBAC)","D":"CN-Series firewalls"}},
{n:16,ans:["C"],stem:"When configuring a Zone Protection profile, in which section (protection type) would an NGFW engineer configure options to protect against activities such as spoofed IP addresses and split handshake session establishment attempts?",opts:{"A":"Flood Protection","B":"Protocol Protection","C":"Packet-Based Attack Protection","D":"Reconnaissance Protection"}},
{n:17,multi:true,ans:["A","B"],stem:"For which two purposes is an IP address configured on a tunnel interface? (Choose two.)",opts:{"A":"Use of dynamic routing protocols","B":"Tunnel monitoring","C":"Use of peer IP","D":"Redistribution of User-ID"}},
{n:18,ans:["B"],stem:"Which PAN-OS method of mapping users to IP addresses is the most reliable?",opts:{"A":"Port mapping","B":"GlobalProtect","C":"Syslog","D":"Server monitoring"}},
{n:19,ans:["A"],stem:"In an active/active high availability (HA) configuration with two PA-Series firewalls, how do the firewalls use the HA3 interface?",opts:{"A":"To forward packets to the HA peer during session setup and asymmetric traffic flow","B":"To exchange hellos, heartbeats, HA state information, and management plane synchronization for routing and User-ID information","C":"To synchronize sessions, forwarding tables, IPSec security associations, and ARP tables between firewalls in an HA pair","D":"To perform session cache synchronization among all HA peers having the same cluster ID"}},
{n:20,ans:["D"],stem:"A PA-Series firewall with all licensable features is being installed. The customer's Security policy requires that users do not directly access websites. Instead, a security device must create the connection, and there must be authentication back to the Active Directory servers for all sessions. Which action meets the requirements in this?",opts:{"A":"Deploy the transparent proxy with Web Cache Communications Protocol (WCCP).","B":"Deploy the Next-Generation Firewalls as normal and install the User-ID agent.","C":"Deploy the Advanced URL Filtering license and captive portal.","D":"Deploy the explicit proxy with Kerberos authentication scheme."}},
{n:21,ans:["D"],stem:"What must be configured before a firewall administrator can define policy rules based on users and groups?",opts:{"A":"User Mapping profile","B":"Authentication profile","C":"Group mapping settings","D":"LDAP Server profile"}},
{n:22,ans:["B"],stem:"Which statement applies to the relationship between Panorama-pushed Security policy and local firewall Security policy?",opts:{"A":"When a policy match is found in a local firewall policy, if any Panorama shared post-rule is configured, it will still be evaluated.","B":"Local firewall rules are evaluated after Panorama pre-rules and before Panorama post-rules.","C":"Panorama post-rules can be configured to be evaluated before local firewall policy for the purpose of troubleshooting.","D":"The order of policy evaluation can be configured differently in different device groups."}},
{n:23,ans:["A"],stem:"Which networking technology can be configured on Layer 3 interfaces but not on Layer 2 interfaces?",opts:{"A":"DDNS","B":"Link Duplex","C":"NetFlow","D":"LLDP"}},
{n:24,ans:["D"],stem:"What is a result of enabling split tunneling in the GlobalProtect portal configuration with the \"Both Network Traffic and DNS\" option?",opts:{"A":"It specifies when the secondary DNS server is used for resolution to allow access to specific domains that are not managed by the VPN.","B":"It allows users to access internal resources when connected locally and external resources when connected remotely using the same FQDN.","C":"It allows devices on a local network to access blocked websites by changing which DNS server resolves certain domain names.","D":"It specifies which domains are resolved by the VPN-assigned DNS servers and which domains are resolved by the local DNS servers."}},
{n:25,ans:["D"],stem:"According to dynamic updates best practices, what is the recommended threshold value for content updates in a mission-critical network?",opts:{"A":"8 hours","B":"16 hours","C":"32 hours","D":"48 hours"}},
{n:26,ans:["B"],stem:"Which type of firewall resource can be assigned when configuring a new firewall virtual system (VSYS)?",opts:{"A":"CPU","B":"Sessions limit","C":"Memory","D":"Security profile limit"}},
{n:27,ans:["A"],stem:"Which forwarding methods can be used on the Objects tab when configuring the Log Forwarding profile?",opts:{"A":"Panorama, syslog, email","B":"Syslog, HTTP, NetFlow","C":"Panorama, ADEM, syslog","D":"SNMP, HTTP, RADIUS"}},
{n:28,ans:["D"],stem:"In a hybrid cloud deployment, what is the primary function of Ansible in managing Palo Alto Networks NGFWs?",opts:{"A":"It provides a web interface for managing NGFW hardware clusters.","B":"It enables centralized log collection and correlation for NGFWs.","C":"It facilitates dynamic updates to NGFW threat databases.","D":"It automates NGFW policy updates and configurations through playbooks."}},
{n:29,multi:true,ans:["C","D"],stem:"Palo Alto Networks NGFWs use SSL/TLS profiles to secure which two types of connections? (Choose two.)",opts:{"A":"NAT tables","B":"User Authentication","C":"GlobalProtect Gateways","D":"GlobalProtect Portal"}},
{n:30,ans:["D"],stem:"How does a Palo Alto Networks firewall choose the best route when it receives routes for the same destination from different routing protocols?",opts:{"A":"The route that was received first will be entered into the forwarding table, and all subsequent routes will be rejected.","B":"It will attempt to load balance the traffic across all routes.","C":"It compares the administrative distance and chooses the one with the highest value.","D":"It compares the administrative distance and chooses the one with the lowest value."}},
{n:31,ans:["B"],stem:"A large enterprise wants to implement certificate-based authentication for both users and devices, using an on-premises Microsoft Active Directory Certificate Services (AD CS) hierarchy as the primary certificate authority (CA). The enterprise also requires Online Certificate Status Protocol (OCSP) checks to ensure efficient revocation status updates and reduce the overhead on its NGFWs. The environment includes multiple Active Directory forests, Panorama management for several geographically dispersed firewalls, GlobalProtect portals and gateways needing distinct certificate profiles for users and devices, and strict Security policies demanding frequent revocation checks with minimal latency. Which approach best addresses these requirements while maintaining consistent policy enforcement?",opts:{"A":"Deploy self-signed certificates at each site to simplify local certificate validation and reduce dependencies on a centralized CA. Turn off certificate revocation checks for lower overhead, rely on IP-based rules for GlobalProtect authentication, and use a single certificate profile for both users and devices.","B":"Distribute the root and intermediate CA certificates via Panorama as shared objects to ensure all firewalls have a consistent trust chain. Configure OCSP responder profiles on each firewall to offload revocation checks to an internal OCSP server while keeping CRL checks as a fallback. Maintain separate certificate profiles for user and device authentication and use an automated enrollment method – such as Group Policy or SCEP – to deploy certificates to endpoints.","C":"Configure each firewall independently to trust the root and intermediate CA certificates. Rely only on manual CRL checks for certificate revocation, and import both user and device certificates directly into each firewall's local certificate store for authentication.","D":"Obtain wildcard certificates from a public CA for both user and device authentication, and configure firewalls to perform CRL polling at the default update interval. Manually install user certificates on endpoints and synchronize firewall certificate stores through frequent manual SSH updates to maintain consistency."}},
{n:32,ans:["C"],stem:"An organization runs multiple Kubernetes clusters both on-premises and in public clouds (AWS, Azure, GCP). They want to deploy the Palo Alto Networks CN-Series NGFW to secure east-west traffic within each cluster, maintain consistent Security policies across all environments, and dynamically scale as containerized workloads spin up or down. They also plan to use a centralized Panorama instance for policy management and visibility. Which approach meets these requirements?",opts:{"A":"Install standalone CN-Series instances in each cluster with local configuration only. Export daily policy configuration snapshots to Panorama for recordkeeping, but do not unify policy enforcement.","B":"Configure the CN-Series only in public cloud clusters, and rely on Kubernetes Network Policies for on-premises cluster security. Synchronize partial policy information into Panorama manually as needed.","C":"Use Kubernetes-native deployment tools (e.g., Helm) to deploy CN-Series in each cluster, ensuring local insertion into the service mesh or CNI. Manage all CN-Series firewalls centrally from Panorama, applying uniform Security policies across on-premises and cloud clusters.","D":"Deploy a single CN-Series firewall in the on-premises data center to process traffic for all clusters, connecting remote clusters via VPN or peering. Manage this single instance through Panorama."}},
{n:33,ans:["C"],stem:"When deploying Palo Alto Networks NGFWs in a cloud service provider (CSP) environment, which method ensures high availability (HA) across multiple availability zones?",opts:{"A":"Deploying Ansible scripts for zone-specific scaling","B":"Implementing Terraform templates for redundancy within one availability zone","C":"Using load balancer and health probes","D":"Configuring active/active HA"}},
{n:34,ans:["A"],stem:"An engineer at a managed services provider is updating an application that allows its customers to request firewall changes to also manage SD-WAN. The application will be able to make any approved changes directly to devices via API. What is a requirement for the application to create SD-WAN interfaces?",opts:{"A":"REST API's \"sdwanInterfaceprofiles\" parameter on a Panorama device","B":"REST API's \"sdwanInterfaces\" parameter on a firewall device","C":"XML API's \"sdwanprofiles/interfaces\" parameter on a Panorama device","D":"XML API's \"InterfaceProfiles/sdwan\" parameter on a firewall device"}},
{n:35,multi:true,ans:["D"],stem:"Which two actions in the IKE Gateways will allow implementation of post-quantum cryptography when building VPNs between multiple Palo Alto Networks NGFWs? (Choose two.)",opts:{"A":"Select IKE v2, enable the Advanced Options → PQ PPK, then set a 64+ character string for the post-quantum pre shared key.","B":"Ensure Authentication is set to \"certificate,\" then import a post-quantum derived certificate.","C":"Select IKE v2 Preferred, enable the Advanced Options → PQ KEM, then add one or more \"Rounds.\"","D":"Select IKE v2, enable the Advanced Options → PQ KEM, then create an IKE Crypto Profile with Advanced Options adding one or more \"Rounds.\""}},
{n:36,ans:["B"],stem:"An NGFW engineer is establishing bidirectional connectivity between the accounting virtual system (VSYS) and the marketing VSYS. The traffic needs to transition between zones without leaving the firewall (no external physical connections). The interfaces for each VSYS are assigned to separate virtual routers (VRs), and inter-VR static routes have been configured. An external zone has been created correctly for each VSYS. Security policies have been added to permit the desired traffic between each zone and its respective external zone. However, the desired traffic is still unable to successfully pass from one VSYS to the other in either direction. Which additional configuration task is required to resolve this issue?",opts:{"A":"Create a transit VSYS and route all inter-VSYS traffic through it.","B":"Add each VSYS to the list of visible virtual systems of the other VSYS.","C":"Enable the \"allow inter-VSYS traffic\" option in both external zone configurations.","D":"Create Security policies to allow the traffic between the two external zones."}},
{n:37,ans:["C"],stem:"Without performing a context switch, which set of operations can be performed that will affect the operation of a connected firewall on the Panorama GUI?",opts:{"A":"Restarting the local firewall, running a packet capture, accessing the firewall CLI","B":"Modification of local security rules, modification of a Layer 3 interface, modification of the firewall device hostname","C":"Modification of pre-security rules, modification of a virtual router, modification of an IKE Gateway Network Profile","D":"Modification of post NAT rules, creation of new views on the local firewall ACC tab, creation of local custom reports"}},
{n:38,ans:["B"],stem:"Which set of options is available for detailed logs when building a custom report on a Palo Alto Networks NGFW?",opts:{"A":"Traffic, User-ID, URL","B":"Traffic, threat, data filtering, User-ID","C":"GlobalProtect, traffic, application statistics","D":"Threat, GlobalProtect, application statistics, WildFire submissions"}},
{n:39,ans:["A"],stem:"An administrator plans to upgrade a pair of active/passive firewalls to a new PAN-OS release. The environment is highly sensitive, and downtime must be minimized. What is the recommended upgrade process for minimal disruption in this high availability (HA) scenario?",opts:{"A":"Suspend the active firewall to trigger a failover to the passive firewall. With traffic now running on the former passive unit, upgrade the suspended (now passive) firewall and confirm proper operation. Then fail traffic back and upgrade the remaining firewall.","B":"Shut down the currently active firewall and upgrade it offline, allowing the passive firewall to handle all traffic. Once the active firewall finishes upgrading, bring it back online and rejoin the HA cluster. Finally, upgrade the passive firewall while the newly upgraded unit remains active.","C":"Isolate both firewalls from the production environment and upgrade them in a separate, offline setup. Reconnect them only after validating the new software version, resuming HA functionality once both units are fully upgraded and tested.","D":"Push the new PAN-OS version simultaneously to both firewalls, having them upgrade and reboot in parallel. Rely on automated HA reconvergence to restore normal operations without manually failing over traffic."}},
{n:40,multi:true,ans:["C","D"],stem:"Which two statements describe an external zone in the context of virtual systems (VSYS) on a Palo Alto Networks firewall? (Choose two.)",opts:{"A":"It is associated with an interface within a VSYS of a firewall.","B":"It is a security object associated with a specific virtual router of a VSYS.","C":"It is not associated with an interface; it is associated with a VSYS itself.","D":"It is a security object associated with a specific VSYS."}},
{n:41,ans:["C"],stem:"Which zone type allows traffic between zones in different virtual systems (VSYS), without the traffic leaving the firewall?",opts:{"A":"Isolated","B":"Transient","C":"External","D":"Internal"}},
{n:42,ans:["B"],stem:"A multinational organization wants to use the Cloud Identity Engine (CIE) to aggregate identity data from multiple sources (on premises AD, Azure AD, Okta) while enforcing strict data isolation for different regional business units. Each region's firewalls, managed via Panorama, must only receive the user and group information relevant to that region. The organization aims to minimize administrative overhead while meeting data sovereignty requirements. Which approach achieves this segmentation of identity data?",opts:{"A":"Create one CIE tenant, aggregate all identity data into a single view, and redistribute the full dataset to all firewalls. Rely on per-firewall Security policies to restrict access to out-of-scope user and group information.","B":"Establish separate CIE tenants for each business unit, integrating each tenant with the relevant identity sources. Redistribute user and group data from each tenant only to the region's firewalls, maintaining a strict one-to-one mapping of tenant to business unit.","C":"Disable redistribution of identity data entirely. Instead, configure each regional firewall to pull user and group details directly from its local identity providers (IdPs).","D":"Deploy a single CIE tenant that collects all identity data, then configure segments within the tenant to filter and redistribute only the relevant user/group sets to each regional firewall group."}},
{n:43,multi:true,ans:["C"],stem:"An engineer is implementing a new rollout of SAML for administrator authentication across a company's Palo Alto Networks NGFWs. User authentication on company firewalls is currently performed with RADIUS, which will remain available for six months, until it is decommissioned. The company wants both authentication types to be running in parallel during the transition to SAML. Which two actions meet the criteria? (Choose two.)",opts:{"A":"Create a testing and rollback plan for the transition from Radius to SAML, as the two authentication profiles cannot be run in tandem.","B":"Create an authentication sequence that includes both the \"RADIUS\" Server Profile and \"SAML Identity Provider\" Server Profile to run the two services in tandem.","C":"Create and apply an authentication profile with the \"SAML Identity Provider\" Server Profile.","D":"Create and add the \"SAML Identity Provider\" Server Profile to the authentication profile for the \"RADIUS\" Server Profile."}},
{n:44,ans:["B"],stem:"An enterprise uses GlobalProtect with both user- and machine-based certificate authentication and requires pre-logon, OCSP checks, and minimal user disruption. They manage multiple firewalls via Panorama and deploy domain-issued machine certificates via Group Policy. Which approach ensures continuous, secure connectivity and consistent policy enforcement?",opts:{"A":"Use a wildcard certificate from a public CA, disable all revocation checks to reduce latency, and manage certificate renewals manually on each firewall.","B":"Distribute root and intermediate CAs via Panorama template, use distinct certificate profiles for user versus machine certs, reference an internal OCSP responder, and automate certificate deployment with Group Policy.","C":"Configure a single certificate profile for both user and machine certificates. Rely solely on CRLs for revocation to minimize complexity.","D":"Deploy self-signed certificates on each firewall, allow IP-based authentication to override certificate checks, and use default GlobalProtect settings for user / machine identification."}},

{n:55,ans:["A"],stem:"A DevOps team is building a repeatable process for deploying new Palo Alto Networks VM-Series firewalls. The entire infrastructure, including virtual networks, subnets, and the firewalls themselves, must be defined in code to ensure consistency and enable version control. Which tool is primarily used for this type of declarative Infrastructure as Code (IaC) provisioning?",opts:{"A":"Terraform","B":"Azure DevOps","C":"Ansible","D":"Panorama"}},
{n:56,multi:true,ans:["B","C"],stem:"A network security engineer is segmenting a single firewall into VSYS-A and VSYS-B. For traffic to flow from VSYS-A to VSYS-B, external zones are required. What are two fundamental properties of the external zones needed for this configuration? (Choose two.)",opts:{"A":"They must be linked to the same virtual router as the ingress interface.","B":"They represent their parent VSYS without being tied to a physical or logical interface.","C":"They are a security construct belonging to a single VSYS.","D":"They are automatically created when inter-VSYS routing is enabled."}},
{n:57,ans:["D"],stem:"A network engineer observes a pattern of anomalous traffic hitting an external-facing zone, including a high volume of TCP packets that are not part of a new session handshake (non-SYN), and a large number of ICMP fragments. The engineer decides to apply a Zone Protection profile to mitigate these potential threats. Which protection type within the profile must be configured?",opts:{"A":"Protocol Protection","B":"Flood Protection","C":"Reconnaissance Protection","D":"Packet-Based Attack Protection"}},

{n:60,ans:["A"],stem:"A network administrator is establishing a site-to-site VPN between a Palo Alto Networks firewall and a partner's Check Point Security Gateway. The partner has provided a specific list of local and remote IP address subnets that are permitted through the tunnel. The initial tunnel configuration on the PAN-OS firewall fails during the IKE Phase 2 exchange. Which configuration step is essential to ensure compatibility with the policy-based Check Point gateway?",opts:{"A":"Define the local and remote subnets provided by the partner in the Proxy ID settings.","B":"Create individual Security policies for each pair of local and remote subnets.","C":"Assign a specific IP address to the tunnel interface to match the Check Point gateway.","D":"Enable Dead Peer Detection (DPD) in the IKE Gateway configuration."}},

{n:62,ans:["A"],stem:"An administrator configures a GlobalProtect gateway with split tunneling for network traffic based on an access route. Users report that public web browsing works, but they cannot resolve the names of internal servers. The administrator determines that all DNS queries are being sent to the public DNS servers configured on the users' endpoints. Which GlobalProtect portal setting should be configured to resolve this issue?",opts:{"A":"Split tunneling for DNS and specify the internal corporate domains in the \"Domain\" list","B":"DNS Proxy feature on the firewall to point clients to the gateway IP for DNS","C":"\"DNS Forwarding\" option on the gateway's tunnel interface","D":"NAT rule to allow DNS traffic from the GlobalProtect clients to the internal DNS servers"}},

{n:64,ans:["B"],stem:"A network security engineer at a 24/7 online retailer is upgrading an active/passive high availability (HA) cluster of PAN-OS firewalls. The primary goal is to perform the upgrade with no service interruption to online transactions. The engineer has already downloaded the new software to both devices. Which sequence of actions will meet this requirement?",opts:{"A":"From Panorama, create a scheduled software update job targeting both firewalls in the HA pair to run at the same time, then rely on the HA election process to manage the failover automatically.","B":"Upgrade the passive firewall first while it is still in the passive state. Once it reboots and is operational, suspend the active firewall to fail over to the newly upgraded device. Then, upgrade the remaining firewall.","C":"Force the active firewall into a suspended state to trigger a failover, then upgrade and reboot it. Suspend the currently active firewall to fail traffic back to the upgraded unit. Upgrade the remaining firewall.","D":"Disable HA synchronization on the active firewall, upgrade the passive firewall, and then re-enable synchronization. Once synchronized, repeat the process on the other firewall."}},

{n:70,ans:["A"],stem:"A network security engineer wants to create Security policy rules that allow or deny traffic based on a user's department, which corresponds to groups in the company's Active Directory. To achieve this, the firewall needs to retrieve group information from the directory server. Which configuration object must be created first to establish the connection with the Active Directory server?",opts:{"A":"LDAP server profile","B":"User-ID agent service account","C":"Authentication sequence","D":"Kerberos server profile"}},

{n:72,ans:["A"],stem:"A large organization has separate production and development environments, each with its own set of firewalls managed by Panorama. The organization uses Cloud Identity Engine (CIE) to consolidate user identities from Active Directory (AD) and Okta. A security mandate requires that development firewalls must only learn about \"DEV\" and \"QA\" user groups, while production firewalls should only see \"Prod\" user groups. How can an administrator enforce this separation using CIE with minimal complexity?",opts:{"A":"Create two segments, one with only \"DEV\" and \"QA\" groups, and one with \"Prod\" groups. Redistribute each segment to the corresponding group of firewalls.","B":"Redistribute all user and group information to all firewalls and use Panorama Device Group hierarchy to apply different Group Mapping profiles.","C":"Create filters using CLI commands to filter \"Prod,\" \"DEV,\" and \"QA\" groups.","D":"Configure two separate CIE instances, one for production and the other for development. Sync each instance to both AD and Okta."}},

{n:77,multi:true,ans:["B","D"],stem:"An organization must secure its AWS and Azure environments using a managed Palo Alto Networks solution, and all policies must be synchronized from an existing Panorama deployment. The organization wants to insert security with the least possible impact on its application teams and use existing hub-and-spoke network designs.\n- The AWS environment uses a centralized AWS Transit Gateway (TGW) architecture.\n- The Azure environment uses a Virtual WAN (vWAN) hub.\n\nWhich two actions are the most appropriate in this use case? (Choose two.)",opts:{"A":"Deploy Cloud NGFW endpoints in every application virtual private cloud (VPC), ignoring the TGW.","B":"Deploy Cloud NGFW into the vWAN hub as a trusted security partner, and update routing policies to secure traffic.","C":"Deploy individual VM-Series firewalls in each spoke virtual network (VNet) and manage them as a device group in Panorama.","D":"Deploy Cloud NGFW endpoints into a security virtual private cloud (VPC), and adjust the TGW route tables to inspect traffic flowing though the hub."}},

{n:79,multi:true,ans:["B","C"],stem:"A network architect is planning the deployment of a new IPSec VPN tunnel to connect a local data center to a cloud environment. The plan must include all necessary Security policy configurations for both tunnel negotiation and data transit. Which two Security policy requirements must be included in the implementation plan? (Choose two.)",opts:{"A":"A policy must explicitly permit the IPSec container application between the external-facing zone and local zone.","B":"A policy must explicitly permit only the IKE application between the external-facing zone and local zone.","C":"A pair of policies is required to control the flow of data traffic into and out of the security zone assigned to the tunnel interface.","D":"The default interzone-default security policy is sufficient to allow the tunnel negotiation traffic between the firewall and the remote peer."}},

const STORAGE_KEY = 'ngfw_quiz_state_v2';
const SHUFFLE_KEY = 'ngfw_quiz_shuffle_v2';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
// shuffleMap[origQn] = { qOrder: index, optMap: { displayLetter: origLetter } }
let shuffleMap = JSON.parse(localStorage.getItem(SHUFFLE_KEY) || 'null');
let displayOrder = []; // array of question objects in display order

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function saveShuffle() { localStorage.setItem(SHUFFLE_KEY, JSON.stringify(shuffleMap)); }

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildShuffle() {
  shuffleMap = {};
  const qOrder = shuffleArray(QUESTIONS.map(q => q.n));
  qOrder.forEach((qn, idx) => {
    const q = QUESTIONS.find(x => x.n === qn);
    const origKeys = ['A','B','C','D'].filter(k => q.opts[k]);
    const shuffled = shuffleArray(origKeys);
    const optMap = {};
    const labels = ['A','B','C','D'];
    shuffled.forEach((origK, i) => { optMap[labels[i]] = origK; });
    shuffleMap[qn] = { idx, optMap };
  });
  saveShuffle();
}

function renderQuiz() {
  if (!shuffleMap) buildShuffle();
  // Build display order
  displayOrder = QUESTIONS.slice().sort((a,b) => shuffleMap[a.n].idx - shuffleMap[b.n].idx);

  const container = document.getElementById('quiz');
  container.innerHTML = '';
  displayOrder.forEach((q, displayIdx) => {
    const div = document.createElement('div');
    div.className = 'q';
    div.id = 'q' + q.n;
    const inputType = q.multi ? 'checkbox' : 'radio';
    const multiHint = q.multi ? `<span class="multi-hint">複選 ${q.ans.length} 項</span>` : '';
    const optMap = shuffleMap[q.n].optMap;
    let optsHtml = '';
    for (const displayK of ['A','B','C','D']) {
      const origK = optMap[displayK];
      if (!origK || !q.opts[origK]) continue;
      optsHtml += `<label class="opt" data-q="${q.n}" data-k="${origK}" data-dk="${displayK}">
        <input type="${inputType}" name="q${q.n}" value="${origK}" onchange="onSelect(${q.n})">
        <b>${displayK}.</b> ${escapeHtml(q.opts[origK])}
      </label>`;
    }
    div.innerHTML = `
      <div class="num">第 ${displayIdx + 1} 題　<span style="color:#888;font-weight:400">(原題庫 Q${q.n})</span> ${multiHint}</div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      ${optsHtml}
      <button class="submit" id="btn${q.n}" onclick="checkAnswer(${q.n})">送出答案</button>
      <div class="feedback" id="fb${q.n}" style="display:none"></div>
    `;
    container.appendChild(div);
  });
  restoreState();
  renderList();
  updateStats();
}

function reshuffle() {
  if (!confirm('重新洗牌會清除目前的作答紀錄，確定嗎？')) return;
  state = {};
  saveState();
  buildShuffle();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Convert original letter to display letter
function origToDisplay(qn, origK) {
  const map = shuffleMap[qn].optMap;
  for (const dK in map) if (map[dK] === origK) return dK;
  return origK;
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function onSelect(n) {
  // Only update visual selection state; don't save until user clicks 送出答案
  const sel = getSelected(n);
  document.querySelectorAll(`.opt[data-q="${n}"]`).forEach(el => {
    el.classList.toggle('selected', sel.includes(el.dataset.k));
  });
}

function getSelected(n) {
  return Array.from(document.querySelectorAll(`input[name="q${n}"]:checked`)).map(i => i.value);
}

function checkAnswer(n) {
  const q = QUESTIONS.find(x => x.n === n);
  const sel = getSelected(n);
  if (sel.length === 0) { alert('請先選擇答案'); return; }
  if (q.multi && sel.length !== q.ans.length) {
    if (!confirm(`此題需選 ${q.ans.length} 項，您只選了 ${sel.length} 項，仍要提交？`)) return;
  }
  const correct = arrayEqual([...sel].sort(), [...q.ans].sort());
  state[n] = { sel, submitted: true, correct };
  saveState();
  showResult(n);
  updateStats();
  renderList();
}

function arrayEqual(a, b) {
  return a.length === b.length && a.every((v,i) => v === b[i]);
}

function showResult(n) {
  const q = QUESTIONS.find(x => x.n === n);
  const s = state[n];
  if (!s || !s.submitted) return;
  document.querySelectorAll(`.opt[data-q="${n}"]`).forEach(el => {
    el.classList.remove('selected','correct','wrong','reveal-correct');
    const isUserPicked = s.sel.includes(el.dataset.k);
    const isCorrectAns = q.ans.includes(el.dataset.k);
    if (isUserPicked && isCorrectAns) el.classList.add('correct');
    else if (isUserPicked && !isCorrectAns) el.classList.add('wrong');
    else if (!isUserPicked && isCorrectAns) el.classList.add('reveal-correct');
    el.querySelector('input').disabled = true;
  });
  const fb = document.getElementById('fb'+n);
  fb.style.display = 'block';
  // Convert original letters → display letters for current shuffle
  const displayAns = q.ans.map(k => origToDisplay(n, k)).sort();
  const displaySel = s.sel.map(k => origToDisplay(n, k)).sort();
  if (s.correct) {
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ 答對了！正確答案：<b>${displayAns.join(', ')}</b>`;
  } else {
    fb.className = 'feedback ng';
    fb.innerHTML = `❌ 答錯。您選：<b>${displaySel.join(', ') || '(未作答)'}</b>　正確答案：<b>${displayAns.join(', ')}</b>`;
  }
  const btn = document.getElementById('btn'+n);
  if (btn) btn.style.display = 'none';
}

function restoreState() {
  for (const n in state) {
    const s = state[n];
    (s.sel || []).forEach(k => {
      const inp = document.querySelector(`input[name="q${n}"][value="${k}"]`);
      if (inp) inp.checked = true;
    });
    // restore visual selected state
    document.querySelectorAll(`.opt[data-q="${n}"]`).forEach(el => {
      el.classList.toggle('selected', (s.sel || []).includes(el.dataset.k));
    });
    if (s.submitted) showResult(parseInt(n));
  }
}

function updateStats() {
  const submitted = Object.values(state).filter(s => s.submitted);
  const answered = submitted.length;
  const ok = submitted.filter(s => s.correct).length;
  const ng = answered - ok;
  document.getElementById('answered').textContent = answered;
  document.getElementById('okCnt').textContent = ok;
  document.getElementById('ngCnt').textContent = ng;
  document.getElementById('rate').textContent = answered ? Math.round(ok/answered*100)+'%' : '—';
}

function renderList() {
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  displayOrder.forEach((q, idx) => {
    const s = document.createElement('span');
    s.textContent = idx + 1;
    s.title = `原題庫 Q${q.n}`;
    const st = state[q.n];
    if (st && st.submitted) {
      s.className = st.correct ? 'done-ok' : 'done-ng';
    } else if (st && st.sel && st.sel.length > 0) {
      s.style.background = '#ffe9d6';
    }
    s.onclick = () => document.getElementById('q'+q.n).scrollIntoView({behavior:'smooth',block:'start'});
    list.appendChild(s);
  });
}

function toggleList() {
  const list = document.getElementById('questionList');
  list.style.display = list.style.display === 'none' ? 'grid' : 'none';
}

function resetAll() {
  if (!confirm('確定要清除全部作答紀錄並重新洗牌？')) return;
  state = {};
  saveState();
  localStorage.removeItem(SHUFFLE_KEY);
  shuffleMap = null;
  location.reload();
}

renderQuiz();
</script>
